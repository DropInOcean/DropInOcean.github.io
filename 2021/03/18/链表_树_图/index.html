<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br></pre></td><td class="code"><pre><span class="line">import java.util.*;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">public class Main &#123;</span><br><span class="line">    public static class TreeNode &#123;</span><br><span class="line">        int val;</span><br><span class="line">        TreeNode left;</span><br><span class="line">        TreeNode right;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        TreeNode(int val)&#123;</span><br><span class="line">            this.val&#x3D;val;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        TreeNode(int val,TreeNode left,TreeNode right)&#123;</span><br><span class="line">            this.val&#x3D;val;</span><br><span class="line">            this.left&#x3D;left;</span><br><span class="line">            this.right&#x3D;right;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    public static TreeNode constructTree(Integer[] nums)&#123;</span><br><span class="line">        if (nums.length &#x3D;&#x3D; 0) return new TreeNode(0);</span><br><span class="line">        Deque&lt;TreeNode&gt; nodeQueue &#x3D; new LinkedList&lt;&gt;();</span><br><span class="line">        &#x2F;&#x2F; 创建一个根节点</span><br><span class="line">        TreeNode root &#x3D; new TreeNode(nums[0]);</span><br><span class="line">        nodeQueue.offer(root);</span><br><span class="line">        TreeNode cur;</span><br><span class="line">        &#x2F;&#x2F; 记录当前行节点的数量（注意不一定是2的幂，而是上一行中非空节点的数量乘2）</span><br><span class="line">        int lineNodeNum &#x3D; 2;</span><br><span class="line">        &#x2F;&#x2F; 记录当前行中数字在数组中的开始位置</span><br><span class="line">        int startIndex &#x3D; 1;</span><br><span class="line">        &#x2F;&#x2F; 记录数组中剩余的元素的数量</span><br><span class="line">        int restLength &#x3D; nums.length - 1;</span><br><span class="line"></span><br><span class="line">        while(restLength &gt; 0) &#123;</span><br><span class="line">           </span><br><span class="line">            for (int i &#x3D; startIndex; i &lt; startIndex + lineNodeNum; i &#x3D; i + 2) &#123;</span><br><span class="line">                &#x2F;&#x2F; 说明已经将nums中的数字用完，此时应停止遍历，并可以直接返回root</span><br><span class="line">                if (i &#x3D;&#x3D; nums.length) return root;</span><br><span class="line">                cur &#x3D; nodeQueue.poll();</span><br><span class="line">                if (nums[i] !&#x3D; null) &#123;</span><br><span class="line">                    cur.left &#x3D; new TreeNode(nums[i]);</span><br><span class="line">                    nodeQueue.offer(cur.left);</span><br><span class="line">                &#125;</span><br><span class="line">                &#x2F;&#x2F; 同上，说明已经将nums中的数字用完，此时应停止遍历，并可以直接返回root</span><br><span class="line">                if (i + 1 &#x3D;&#x3D; nums.length) return root;</span><br><span class="line">                if (nums[i + 1] !&#x3D; null) &#123;</span><br><span class="line">                    cur.right &#x3D; new TreeNode(nums[i + 1]);</span><br><span class="line">                    nodeQueue.offer(cur.right);</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">            startIndex +&#x3D; lineNodeNum;</span><br><span class="line">            restLength -&#x3D; lineNodeNum;</span><br><span class="line">            lineNodeNum &#x3D; nodeQueue.size() * 2;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return root;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    public void preOrder(TreeNode root) &#123;</span><br><span class="line">        if (root &#x3D;&#x3D; null) return;</span><br><span class="line">        System.out.print(root.val + &quot; &quot;);</span><br><span class="line">        preOrder(root.left);</span><br><span class="line">        preOrder(root.right);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    public int[] levelOrder(TreeNode root) &#123;</span><br><span class="line">        if(root&#x3D;&#x3D;null) return new int[0];</span><br><span class="line">        Queue&lt;TreeNode&gt; a&#x3D;new LinkedList&lt;&gt;();</span><br><span class="line">        ArrayList&lt;Integer&gt; sum&#x3D;new ArrayList&lt;&gt;();</span><br><span class="line">        a.add(root);</span><br><span class="line">        while(!a.isEmpty())&#123;</span><br><span class="line">            TreeNode t&#x3D;a.poll();</span><br><span class="line">            sum.add(t.val);</span><br><span class="line">            if(t.left!&#x3D;null) a.add(t.left);</span><br><span class="line">            if(t.right!&#x3D;null) a.add(t.right);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        int[] p&#x3D;new int[sum.size()];</span><br><span class="line">        for(int i&#x3D;0;i&lt;sum.size();i++)&#123;</span><br><span class="line">            p[i]&#x3D;sum.get(i);</span><br><span class="line">        &#125;</span><br><span class="line">        return p;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    public static void main(String[] args) &#123;</span><br><span class="line">        Integer[] nums &#x3D; &#123;5,4,8,11,null,13,4,7,2,null,null,null,1&#125;;</span><br><span class="line">        TreeNode root &#x3D; constructTree(nums);</span><br><span class="line">       &#x2F;&#x2F; System.out.println(root);</span><br><span class="line"></span><br><span class="line">       Main t&#x3D;new Main();</span><br><span class="line">        &#x2F;&#x2F;t.preOrder(root);</span><br><span class="line">        int[] s&#x3D;t.levelOrder(root);</span><br><span class="line">        for(int i&#x3D;0;i&lt;s.length;i++)&#123;</span><br><span class="line">            System.out.print(s[i]+&quot; &quot;);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
