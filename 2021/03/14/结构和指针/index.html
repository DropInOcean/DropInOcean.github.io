        <h2 id="结构"><a href="#结构" class="headerlink" title="结构"></a>结构</h2><p>1.<strong>struct的用法</strong></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">struct node&#123;</span><br><span class="line">    int data[20];</span><br><span class="line">	int maxlength;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
<p>则定义了node结构，结构由data[]数组和最大长度maxlength两个组成</p>
<p>2.<strong>使用方法</strong><br>    - 定义结构变量从而使用<br>    <code>struct node list;</code><br>    - 简化<br>    <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">struct node&#123;</span><br><span class="line"></span><br><span class="line">&#125;list;</span><br></pre></td></tr></table></figure></p>
<h2 id="结构传递的方法"><a href="#结构传递的方法" class="headerlink" title="结构传递的方法"></a>结构传递的方法</h2><p>1.<strong>通过指针传递结构</strong></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">int mian()</span><br><span class="line">&#123;</span><br><span class="line">    struct node L;</span><br><span class="line">	initialList(&amp;L);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">initialList(struct node *pst)</span><br><span class="line">&#123;</span><br><span class="line">    pst-&gt;maxlength&#x3D;0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>2.<strong>传递结构</strong>    </p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">int mian()</span><br><span class="line">&#123;</span><br><span class="line">    struct node L;</span><br><span class="line">	initialList(L);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">initialList(struct node pst)</span><br><span class="line">&#123;</span><br><span class="line">    pst.maxlength&#x3D;0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="一个简化方法"><a href="#一个简化方法" class="headerlink" title="一个简化方法"></a>一个简化方法</h2><p><strong>typedef</strong></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">typedef struct node&#123;</span><br><span class="line">    int data[20];</span><br><span class="line">	int maxlength;</span><br><span class="line">&#125;link;</span><br></pre></td></tr></table></figure>
<p>定义方法：link *L;</p>
